<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1C2541" />
<title>Work Ledger</title>
<style>
  :root {
    --paper: #F4F1E8;
    --card: #FBF9F4;
    --border: #DCD5C4;
    --ink: #1C2541;
    --ink-soft: #6B6357;
    --ink-faint: #8B8375;
    --gold: #8B6F3F;
    --red: #B3452C;
    --green: #1C6E4C;
    --row-hover: #F0EBDD;
    --row-selected: #EFE6CC;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .mono { font-family: ui-monospace, "SF Mono", "Roboto Mono", "Courier New", monospace; }
  .wrap { max-width: 560px; margin: 0 auto; padding-bottom: 48px; }

  header {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 5;
  }
  header .eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
  header h1 { font-size: 18px; margin: 2px 0 0; font-weight: 600; }
  header .btns { display: flex; gap: 8px; }
  .icon-btn {
    border: 1px solid var(--border); background: transparent; color: var(--ink-soft);
    border-radius: 8px; padding: 7px 9px; font-size: 15px; cursor: pointer;
  }
  .icon-btn:active { background: var(--row-hover); }

  section { padding: 16px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
  }
  .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft); margin-bottom: 6px; display:block;
  }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-label { font-size: 11px; color: var(--ink-faint); margin-bottom: 4px; display: block; }
  input[type=time], input[type=number], input[type=date] {
    width: 100%; font-family: inherit; font-size: 14px; padding: 8px; border: 1px solid var(--border);
    border-radius: 8px; background: #fff; color: var(--ink);
  }
  input.mono { font-size: 14px; }
  .top-row { display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px; }

  .primary-btn {
    width: 100%; margin-top: 12px; padding: 11px; border: none; border-radius: 8px;
    background: var(--ink); color: var(--paper); font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .primary-btn:active { background: #293659; }
  .ghost-btn {
    padding: 9px; border: 1px solid var(--border); border-radius: 8px; background: transparent;
    color: var(--ink-soft); font-size: 13px; cursor: pointer;
  }

  .warn { margin-top: 10px; display:flex; align-items:center; gap:6px; font-size: 12px; color: var(--red); }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
  .stat {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px;
    display: flex; flex-direction: column; min-width: 0;
  }
  .stat .s-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft); }
  .stat .s-value { font-family: ui-monospace, monospace; font-size: 19px; margin-top: 4px; white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
  .stat .s-sub { font-size: 10.5px; color: var(--ink-faint); margin-top: 4px; }

  .month-nav { display: flex; align-items: center; justify-content: space-between; margin: 22px 0 12px; }
  .month-nav .m-label { font-size: 15px; font-weight: 600; }

  .wd-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; }
  .wd-row input { width: 56px; text-align: center; padding: 4px; }
  .wd-hint { color: #B0A990; }

  table.ledger { width: 100%; border-collapse: collapse; }
  .ledger thead th {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint);
    text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border);
  }
  .ledger thead th:last-child { text-align: right; }
  .ledger tbody tr { border-bottom: 1px solid #EDE8DA; cursor: pointer; }
  .ledger tbody tr:active, .ledger tbody tr.hover { background: var(--row-hover); }
  .ledger tbody tr.selected { background: var(--row-selected); }
  .ledger tbody tr.empty { opacity: 0.4; }
  .ledger td { padding: 7px 10px; font-size: 12.5px; }
  .ledger td:last-child { text-align: right; }
  .ledger-wrap { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--card); }
  .ledger-scroll { max-height: 320px; overflow-y: auto; }
  .ot-cell { color: var(--gold); }
  .late-dot { color: var(--red); font-size: 10px; margin-left: 3px; }

  .backup-row { display: flex; gap: 8px; margin-top: 18px; }
  .backup-row .ghost-btn { flex: 1; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: flex-end;
    justify-content: center; z-index: 20;
  }
  .modal {
    width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border);
    border-radius: 18px 18px 0 0; padding: 18px; max-height: 85vh; overflow-y: auto;
  }
  .modal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .modal-top h2 { font-size: 14px; font-weight: 600; margin: 0; display:flex; align-items:center; gap:6px; }
  .close-x { border: none; background: none; font-size: 18px; color: var(--ink-faint); cursor: pointer; }
  .field { margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .btn-cancel { border: 1px solid var(--border); background: transparent; color: var(--ink-soft); }
  .btn-save { border: none; background: var(--ink); color: var(--paper); font-weight: 600; }

  .time-field { border: 1px solid var(--border); border-radius: 8px; background: #fff; padding: 8px; }
  .time-display { font-size: 20px; display: block; text-align: center; margin-bottom: 8px; letter-spacing: 0.02em; }
  .time-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .tbtn {
    border: 1px solid var(--border); background: var(--paper); color: var(--ink-soft);
    border-radius: 7px; padding: 6px 4px; font-size: 11px; cursor: pointer;
  }
  .tbtn:active { background: var(--row-hover); }

  .picker-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none;
    align-items: flex-end; justify-content: center; z-index: 40;
  }
  .picker-backdrop.show { display: flex; }
  .picker-sheet {
    width: 100%; max-width: 480px; background: var(--card); border-radius: 18px 18px 0 0;
    padding: 18px; border: 1px solid var(--border);
  }
  .picker-title { font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 14px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.08em; }
  .wheel-wrap { position: relative; display: flex; justify-content: center; gap: 4px; height: 160px; }
  .wheel-highlight {
    position: absolute; top: 60px; left: 8%; right: 8%; height: 40px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    background: var(--row-selected); border-radius: 8px; pointer-events: none; opacity: 0.6;
  }
  .wheel {
    width: 70px; height: 160px; overflow-y: scroll; scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .wheel::-webkit-scrollbar { display: none; }
  .wheel-item {
    height: 40px; display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, monospace; font-size: 20px; color: var(--ink-faint);
    scroll-snap-align: center;
  }
  .wheel-sep { display:flex; align-items:center; font-size: 20px; color: var(--ink-soft); height:160px; }
  .type-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
  .type-row input {
    width: 70px; text-align: center; font-size: 22px; padding: 10px; border: 1px solid var(--border);
    border-radius: 8px; font-family: ui-monospace, monospace;
  }
  .picker-actions { display: flex; gap: 8px; margin-top: 16px; }
  .picker-actions button { flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; cursor: pointer; }

  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--paper); padding: 9px 16px; border-radius: 999px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 30;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Daily Ledger</div>
      <h1>Work Hours &amp; Pay</h1>
    </div>
    <div class="btns">
      <button class="icon-btn" id="settingsBtn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <section>
    <div class="card">
      <div class="top-row">
        <label class="label" style="margin:0;">Entry for</label>
        <input type="date" id="dateInput" class="mono" />
      </div>
      <div class="row-3">
        <div>
          <label class="field-label">Clock in</label>
          <div class="time-field">
            <span class="time-display mono" id="clockInDisplay">--:--</span>
            <div class="time-actions">
              <button type="button" class="tbtn" data-target="clockIn" data-action="now">Now</button>
              <button type="button" class="tbtn" data-target="clockIn" data-action="scroll">Scroll</button>
              <button type="button" class="tbtn" data-target="clockIn" data-action="type">Type</button>
            </div>
          </div>
        </div>
        <div>
          <label class="field-label">Clock out</label>
          <div class="time-field">
            <span class="time-display mono" id="clockOutDisplay">--:--</span>
            <div class="time-actions">
              <button type="button" class="tbtn" data-target="clockOut" data-action="now">Now</button>
              <button type="button" class="tbtn" data-target="clockOut" data-action="scroll">Scroll</button>
              <button type="button" class="tbtn" data-target="clockOut" data-action="type">Type</button>
            </div>
          </div>
        </div>
        <div>
          <label class="field-label">Break (min)</label>
          <input type="number" id="breakMin" class="mono" min="0" value="0" />
        </div>
      </div>
      <button class="primary-btn" id="saveDayBtn">Save day</button>
      <div class="warn" id="lateWarn" style="display:none;">⚠ Late arrival — deduction applied</div>
    </div>

    <div class="stats-grid" id="todayStats"></div>

    <div class="month-nav">
      <button class="icon-btn" id="prevMonth">‹</button>
      <div class="m-label" id="monthLabel"></div>
      <button class="icon-btn" id="nextMonth">›</button>
    </div>

    <div class="stats-grid" id="monthStats" style="margin-top:0;"></div>

    <div class="wd-row" style="margin-top:14px;">
      <span>Working days this month:</span>
      <input type="number" id="workingDaysInput" class="mono" min="0" />
      <span class="wd-hint">(auto: days in month − 4)</span>
    </div>
    <div class="wd-row" id="rateLine" style="margin-top:-4px;"></div>

    <div class="ledger-wrap">
      <table class="ledger">
        <thead>
          <tr><th style="width:2rem;">Day</th><th>Worked</th><th>OT</th><th>Pay</th></tr>
        </thead>
      </table>
      <div class="ledger-scroll">
        <table class="ledger"><tbody id="monthBody"></tbody></table>
      </div>
    </div>

    <div class="backup-row">
      <button class="ghost-btn" id="exportBtn">⬇ Export backup</button>
      <button class="ghost-btn" id="importBtn">⬆ Import backup</button>
      <input type="file" id="importFile" accept="application/json" style="display:none;" />
    </div>
  </section>
</div>

<div class="modal-backdrop" id="settingsModal" style="display:none;">
  <div class="modal">
    <div class="modal-top">
      <h2>⏱ Pay settings</h2>
      <button class="close-x" id="closeSettings">✕</button>
    </div>
    <div class="field">
      <label class="field-label">Shift start time</label>
      <input type="time" id="setShiftStart" class="mono" />
    </div>
    <div class="field">
      <label class="field-label">Standard hours before OT</label>
      <input type="number" id="setStandardHours" class="mono" step="0.5" />
    </div>
    <div class="field">
      <label class="field-label">Monthly salary (Rs)</label>
      <input type="number" id="setMonthlySalary" class="mono" />
    </div>
    <div class="field">
      <label class="field-label">OT multiplier</label>
      <input type="number" id="setOtMultiplier" class="mono" step="0.1" />
    </div>
    <div class="field">
      <label class="field-label">Late deduction (Rs, flat)</label>
      <input type="number" id="setLateDeduction" class="mono" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelSettings">Cancel</button>
      <button class="btn-save" id="saveSettingsBtn">Save</button>
    </div>
  </div>
</div>

<div class="picker-backdrop" id="scrollPickerBackdrop">
  <div class="picker-sheet">
    <div class="picker-title">Set time</div>
    <div class="wheel-wrap">
      <div class="wheel-highlight"></div>
      <div class="wheel" id="hourWheel"></div>
      <div class="wheel-sep">:</div>
      <div class="wheel" id="minuteWheel"></div>
    </div>
    <div class="picker-actions">
      <button class="btn-cancel" id="scrollPickerCancel">Cancel</button>
      <button class="btn-save" id="scrollPickerSet">Set</button>
    </div>
  </div>
</div>

<div class="picker-backdrop" id="typePickerBackdrop">
  <div class="picker-sheet">
    <div class="picker-title">Type time</div>
    <div class="type-row">
      <input type="number" id="typeHour" class="mono" min="0" max="23" placeholder="HH" />
      <span style="font-size:20px;">:</span>
      <input type="number" id="typeMinute" class="mono" min="0" max="59" placeholder="MM" />
    </div>
    <div class="picker-actions">
      <button class="btn-cancel" id="typePickerCancel">Cancel</button>
      <button class="btn-save" id="typePickerSet">Set</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  "use strict";

  // ---------- storage keys ----------
  const K_SETTINGS = "wl_settings";
  const K_ENTRIES = "wl_entries";        // { "YYYY-MM-DD": {clockIn, clockOut, breakMinutes} }
  const K_OVERRIDES = "wl_workingdays";  // { "YYYY-MM": number }

  const DEFAULT_SETTINGS = {
    shiftStart: "07:15",
    standardHours: 9,
    monthlySalary: 30000,
    otMultiplier: 1.5,
    lateDeduction: 200,
  };

  function loadJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) {
      return fallback;
    }
  }
  function saveJSON(key, val) {
    localStorage.setItem(key, JSON.stringify(val));
  }

  let settings = { ...DEFAULT_SETTINGS, ...loadJSON(K_SETTINGS, {}) };
  let entries = loadJSON(K_ENTRIES, {});
  let overrides = loadJSON(K_OVERRIDES, {});

  // ---------- helpers ----------
  const pad = (n) => String(n).padStart(2, "0");
  const todayISO = () => {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  };
  const monthKeyOf = (iso) => iso.slice(0, 7);
  const daysInMonth = (ym) => {
    const [y, m] = ym.split("-").map(Number);
    return new Date(y, m, 0).getDate();
  };
  const defaultWorkingDays = (ym) => Math.max(0, daysInMonth(ym) - 4);
  const timeToMinutes = (t) => {
    if (!t) return null;
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
  };
  const minutesToHM = (mins) => {
    if (mins == null || isNaN(mins)) return "0h 00m";
    const sign = mins < 0 ? "-" : "";
    mins = Math.abs(Math.round(mins));
    return `${sign}${Math.floor(mins / 60)}h ${pad(mins % 60)}m`;
  };
  const rupees = (n) => {
    n = n || 0;
    const sign = n < 0 ? "-" : "";
    return "Rs " + sign + Math.abs(n).toLocaleString("en-LK", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  };

  function getHourlyRate(workingDays) {
    if (!workingDays) return 0;
    const dailyPay = settings.monthlySalary / workingDays;
    return dailyPay / settings.standardHours;
  }

  function computeDay(entry, hourlyRate, liveNow) {
    const empty = { hasEntry: false, late: false, workedMinutes: 0, otMinutes: 0, normalPay: 0, otPay: 0, lateDeduction: 0, totalPay: 0, isLive: false };
    if (!entry || !entry.clockIn) return empty;
    let outMin;
    let isLive = false;
    if (entry.clockOut) {
      outMin = timeToMinutes(entry.clockOut);
    } else if (liveNow) {
      outMin = liveNow.getHours() * 60 + liveNow.getMinutes();
      isLive = true;
    } else {
      return empty;
    }
    const inMin = timeToMinutes(entry.clockIn);
    if (outMin < inMin) outMin += 24 * 60;
    const shiftStartMin = timeToMinutes(settings.shiftStart);
    const late = inMin > shiftStartMin;
    const standardMinutes = settings.standardHours * 60;
    const workedMinutes = Math.max(0, outMin - inMin - (Number(entry.breakMinutes) || 0));
    const normalMinutes = Math.min(workedMinutes, standardMinutes);
    const otMinutes = Math.max(0, workedMinutes - standardMinutes);
    const normalPay = (normalMinutes / 60) * hourlyRate;
    const otPay = (otMinutes / 60) * hourlyRate * settings.otMultiplier;
    const lateDeduction = late ? settings.lateDeduction : 0;
    const totalPay = normalPay + otPay - lateDeduction;
    return { hasEntry: true, late, workedMinutes, otMinutes, normalPay, otPay, lateDeduction, totalPay, isLive };
  }

  // ---------- state ----------
  let selectedDate = todayISO();
  let ym = monthKeyOf(selectedDate);

  // ---------- DOM refs ----------
  const $ = (id) => document.getElementById(id);
  const dateInput = $("dateInput");
  const clockInDisplay = $("clockInDisplay");
  const clockOutDisplay = $("clockOutDisplay");
  const breakMin = $("breakMin");
  let clockInValue = "";
  let clockOutValue = "";
  const lateWarn = $("lateWarn");
  const todayStats = $("todayStats");
  const monthLabel = $("monthLabel");
  const monthStats = $("monthStats");
  const monthBody = $("monthBody");
  const workingDaysInput = $("workingDaysInput");
  const toast = $("toast");

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1400);
  }

  function statCard(label, value, sub, color) {
    return `<div class="stat"><span class="s-label">${label}</span><span class="s-value" style="color:${color || "var(--ink)"}">${value}</span>${sub ? `<span class="s-sub">${sub}</span>` : ""}</div>`;
  }

  function renderDayForm() {
    dateInput.value = selectedDate;
    const e = entries[selectedDate];
    clockInValue = e?.clockIn || "";
    clockOutValue = e?.clockOut || "";
    clockInDisplay.textContent = clockInValue || "--:--";
    clockOutDisplay.textContent = clockOutValue || "--:--";
    breakMin.value = e?.breakMinutes != null ? e.breakMinutes : 0;
    updateDayStats();
  }

  function updateDayStats() {
    const draftEntry = {
      clockIn: clockInValue,
      clockOut: clockOutValue,
      breakMinutes: Number(breakMin.value) || 0,
    };
    const workingDays = overrides[ym] != null ? overrides[ym] : defaultWorkingDays(ym);
    const hourlyRate = getHourlyRate(workingDays);
    const isToday = selectedDate === todayISO();
    const liveNow = isToday && clockInValue && !clockOutValue ? new Date() : null;
    const calc = computeDay(draftEntry, hourlyRate, liveNow);
    lateWarn.style.display = calc.late ? "flex" : "none";
    lateWarn.textContent = calc.late ? `⚠ Late arrival — Rs ${settings.lateDeduction} deduction applied` : "";

    const payLabel = calc.isLive ? "Live earning" : "Day pay";
    const payColor = calc.isLive ? "var(--green)" : null;
    const liveBadge = calc.isLive ? `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;"></span>` : "";

    todayStats.innerHTML =
      statCard("Worked" + (calc.isLive ? " (so far)" : ""), minutesToHM(calc.workedMinutes)) +
      statCard("OT hours", minutesToHM(calc.otMinutes), null, "var(--gold)") +
      statCard(liveBadge + payLabel, rupees(calc.totalPay), `normal ${rupees(calc.normalPay)} + OT ${rupees(calc.otPay)}`, payColor) +
      statCard("Deduction", rupees(-calc.lateDeduction), null, calc.lateDeduction ? "var(--red)" : "var(--ink)");
  }

  // refresh the live earning ticker every 20 seconds without touching unsaved draft fields
  setInterval(updateDayStats, 20000);

  function renderMonth() {
    const [y, m] = ym.split("-").map(Number);
    monthLabel.textContent = new Date(y, m - 1, 1).toLocaleDateString("en-GB", { month: "long", year: "numeric" });

    const workingDays = overrides[ym] != null ? overrides[ym] : defaultWorkingDays(ym);
    const hourlyRate = getHourlyRate(workingDays);
    const dailyRate = hourlyRate * settings.standardHours;
    const otRate = hourlyRate * settings.otMultiplier;
    workingDaysInput.value = workingDays;

    const total = daysInMonth(ym);
    const rows = [];
    let sums = { worked: 0, ot: 0, normalPay: 0, otPay: 0, deductions: 0, total: 0, daysWorked: 0, lateDays: 0 };

    for (let d = 1; d <= total; d++) {
      const iso = `${ym}-${pad(d)}`;
      const calc = computeDay(entries[iso], hourlyRate);
      rows.push({ iso, day: d, ...calc });
      sums.worked += calc.workedMinutes;
      sums.ot += calc.otMinutes;
      sums.normalPay += calc.normalPay;
      sums.otPay += calc.otPay;
      sums.deductions += calc.lateDeduction;
      sums.total += calc.totalPay;
      sums.daysWorked += calc.hasEntry ? 1 : 0;
      sums.lateDays += calc.late ? 1 : 0;
    }

    monthStats.innerHTML =
      statCard("Normal pay total", rupees(sums.normalPay)) +
      statCard("OT pay total", rupees(sums.otPay), null, "var(--gold)") +
      statCard("Total OT hours", minutesToHM(sums.ot), null, "var(--gold)") +
      statCard("Total earned", rupees(sums.total), sums.deductions ? `after − ${rupees(sums.deductions)} deductions` : null, "var(--green)") +
      statCard("Days worked", `${sums.daysWorked} / ${workingDays}`, "working days this month") +
      statCard("Late days", String(sums.lateDays), sums.deductions ? `− ${rupees(sums.deductions)} total` : "no deductions", sums.lateDays ? "var(--red)" : "var(--ink)");

    // rate summary line under working days input
    const rateLine = $("rateLine");
    if (rateLine) {
      rateLine.textContent = `Daily: ${rupees(dailyRate)}  ·  Hourly: ${rupees(hourlyRate)}  ·  OT/hr: ${rupees(otRate)}`;
    }

    monthBody.innerHTML = rows.map((r) => {
      const cls = ["", r.iso === selectedDate ? "selected" : "", r.hasEntry ? "" : "empty"].join(" ").trim();
      return `<tr class="${cls}" data-date="${r.iso}">
        <td>${r.day}${r.late ? '<span class="late-dot">⚠</span>' : ""}</td>
        <td>${r.hasEntry ? minutesToHM(r.workedMinutes) : "—"}</td>
        <td class="${r.otMinutes ? "ot-cell" : ""}">${r.otMinutes ? minutesToHM(r.otMinutes) : "—"}</td>
        <td>${r.hasEntry ? rupees(r.totalPay) : "—"}</td>
      </tr>`;
    }).join("");

    monthBody.querySelectorAll("tr").forEach((tr) => {
      tr.addEventListener("click", () => {
        selectedDate = tr.getAttribute("data-date");
        renderDayForm();
        renderMonth();
      });
    });
  }


  function renderAll() {
    renderDayForm();
    renderMonth();
  }

  // ---------- events ----------
  dateInput.addEventListener("change", () => {
    selectedDate = dateInput.value;
    ym = monthKeyOf(selectedDate);
    renderAll();
  });

  $("saveDayBtn").addEventListener("click", () => {
    if (!clockInValue && !clockOutValue) {
      delete entries[selectedDate];
    } else {
      entries[selectedDate] = {
        clockIn: clockInValue,
        clockOut: clockOutValue,
        breakMinutes: Number(breakMin.value) || 0,
      };
    }
    saveJSON(K_ENTRIES, entries);
    showToast("Saved");
    renderAll();
  });

  $("prevMonth").addEventListener("click", () => {
    const [y, m] = ym.split("-").map(Number);
    const d = new Date(y, m - 2, 1);
    ym = `${d.getFullYear()}-${pad(d.getMonth() + 1)}`;
    renderMonth();
  });
  $("nextMonth").addEventListener("click", () => {
    const [y, m] = ym.split("-").map(Number);
    const d = new Date(y, m, 1);
    ym = `${d.getFullYear()}-${pad(d.getMonth() + 1)}`;
    renderMonth();
  });

  breakMin.addEventListener("input", updateDayStats);

  workingDaysInput.addEventListener("change", () => {
    overrides[ym] = Number(workingDaysInput.value) || 0;
    saveJSON(K_OVERRIDES, overrides);
    renderMonth();
  });

  // settings modal
  const settingsModal = $("settingsModal");
  function openSettings() {
    $("setShiftStart").value = settings.shiftStart;
    $("setStandardHours").value = settings.standardHours;
    $("setMonthlySalary").value = settings.monthlySalary;
    $("setOtMultiplier").value = settings.otMultiplier;
    $("setLateDeduction").value = settings.lateDeduction;
    settingsModal.style.display = "flex";
  }
  function closeSettings() { settingsModal.style.display = "none"; }
  $("settingsBtn").addEventListener("click", openSettings);
  $("closeSettings").addEventListener("click", closeSettings);
  $("cancelSettings").addEventListener("click", closeSettings);
  $("saveSettingsBtn").addEventListener("click", () => {
    settings = {
      shiftStart: $("setShiftStart").value || DEFAULT_SETTINGS.shiftStart,
      standardHours: Number($("setStandardHours").value) || DEFAULT_SETTINGS.standardHours,
      monthlySalary: Number($("setMonthlySalary").value) || DEFAULT_SETTINGS.monthlySalary,
      otMultiplier: Number($("setOtMultiplier").value) || DEFAULT_SETTINGS.otMultiplier,
      lateDeduction: Number($("setLateDeduction").value) || DEFAULT_SETTINGS.lateDeduction,
    };
    saveJSON(K_SETTINGS, settings);
    closeSettings();
    showToast("Settings saved");
    renderAll();
  });

  // backup / restore
  $("exportBtn").addEventListener("click", () => {
    const backup = { settings, entries, overrides, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `work-ledger-backup-${todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Backup downloaded");
  });

  $("importBtn").addEventListener("click", () => $("importFile").click());
  $("importFile").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.settings) settings = { ...DEFAULT_SETTINGS, ...data.settings };
        if (data.entries) entries = data.entries;
        if (data.overrides) overrides = data.overrides;
        saveJSON(K_SETTINGS, settings);
        saveJSON(K_ENTRIES, entries);
        saveJSON(K_OVERRIDES, overrides);
        showToast("Backup restored");
        renderAll();
      } catch (err) {
        showToast("Invalid backup file");
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  });

  // ---------- time pickers (Now / Scroll wheel / Type) ----------
  const pad2 = (n) => String(n).padStart(2, "0");
  function setTimeValue(target, hhmm) {
    if (target === "clockIn") { clockInValue = hhmm; clockInDisplay.textContent = hhmm; }
    else { clockOutValue = hhmm; clockOutDisplay.textContent = hhmm; }
    updateDayStats();
  }
  function getTimeValue(target) {
    return target === "clockIn" ? clockInValue : clockOutValue;
  }

  document.querySelectorAll(".tbtn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const target = btn.getAttribute("data-target");
      const action = btn.getAttribute("data-action");
      if (action === "now") {
        const d = new Date();
        setTimeValue(target, `${pad2(d.getHours())}:${pad2(d.getMinutes())}`);
        showToast("Time set to now");
      } else if (action === "scroll") {
        openScrollPicker(target);
      } else if (action === "type") {
        openTypePicker(target);
      }
    });
  });

  // -- scroll wheel picker --
  const ITEM_H = 40;
  const hourWheel = $("hourWheel");
  const minuteWheel = $("minuteWheel");
  let scrollTarget = null;

  function buildWheel(el, max, current) {
    const spacer = (ITEM_H * 2) + "px";
    let html = `<div style="height:${spacer}"></div>`;
    for (let i = 0; i < max; i++) {
      html += `<div class="wheel-item" data-val="${i}">${pad2(i)}</div>`;
    }
    html += `<div style="height:${spacer}"></div>`;
    el.innerHTML = html;
    el.scrollTop = current * ITEM_H;
  }

  function openScrollPicker(target) {
    scrollTarget = target;
    const current = getTimeValue(target) || "07:00";
    const [h, m] = current.split(":").map(Number);
    buildWheel(hourWheel, 24, h || 0);
    buildWheel(minuteWheel, 60, m || 0);
    $("scrollPickerBackdrop").classList.add("show");
  }
  function closeScrollPicker() {
    $("scrollPickerBackdrop").classList.remove("show");
  }
  $("scrollPickerCancel").addEventListener("click", closeScrollPicker);
  $("scrollPickerSet").addEventListener("click", () => {
    const h = Math.max(0, Math.min(23, Math.round(hourWheel.scrollTop / ITEM_H)));
    const m = Math.max(0, Math.min(59, Math.round(minuteWheel.scrollTop / ITEM_H)));
    setTimeValue(scrollTarget, `${pad2(h)}:${pad2(m)}`);
    closeScrollPicker();
    showToast("Time set");
  });

  // -- type picker --
  let typeTarget = null;
  function openTypePicker(target) {
    typeTarget = target;
    const current = getTimeValue(target) || "";
    const [h, m] = current.split(":");
    $("typeHour").value = h || "";
    $("typeMinute").value = m || "";
    $("typePickerBackdrop").classList.add("show");
  }
  function closeTypePicker() {
    $("typePickerBackdrop").classList.remove("show");
  }
  $("typePickerCancel").addEventListener("click", closeTypePicker);
  $("typePickerSet").addEventListener("click", () => {
    let h = Math.max(0, Math.min(23, Number($("typeHour").value) || 0));
    let m = Math.max(0, Math.min(59, Number($("typeMinute").value) || 0));
    setTimeValue(typeTarget, `${pad2(h)}:${pad2(m)}`);
    closeTypePicker();
    showToast("Time set");
  });

  // ---------- init ----------
  renderAll();
})();
</script>
</body>
</html>
