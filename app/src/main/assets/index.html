<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1C2541" />
<title>Work Ledger</title>
<style>
  :root {
    --paper: #F4F1E8;
    --card: #FBF9F4;
    --border: #DCD5C4;
    --ink: #1C2541;
    --ink-soft: #6B6357;
    --ink-faint: #8B8375;
    --gold: #8B6F3F;
    --red: #B3452C;
    --green: #1C6E4C;
    --row-hover: #F0EBDD;
    --row-selected: #EFE6CC;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .mono { font-family: ui-monospace, "SF Mono", "Roboto Mono", "Courier New", monospace; }
  .wrap { max-width: 560px; margin: 0 auto; padding-bottom: 48px; }

  header {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    padding: 14px 16px 12px;
    position: sticky; top: 0; z-index: 5;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  header .eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
  header h1 { font-size: 18px; margin: 2px 0 0; font-weight: 600; }
  header .credit { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.03em; margin-top: 2px; }
  .icon-btn {
    border: 1px solid var(--border); background: transparent; color: var(--ink-soft);
    border-radius: 8px; padding: 7px 9px; font-size: 15px; cursor: pointer;
  }
  .icon-btn:active { background: var(--row-hover); }

  .tabs { display: flex; gap: 8px; padding: 12px 16px 0; }
  .tab-btn {
    flex: 1; padding: 9px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--card); color: var(--ink-soft); font-weight: 600; font-size: 13px; cursor: pointer;
  }
  .tab-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  section { padding: 14px 16px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
  }
  .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft); margin-bottom: 6px; display:block;
  }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-label { font-size: 11px; color: var(--ink-faint); margin-bottom: 4px; display: block; }
  input[type=time], input[type=number], input[type=date], select {
    width: 100%; font-family: inherit; font-size: 14px; padding: 8px; border: 1px solid var(--border);
    border-radius: 8px; background: #fff; color: var(--ink);
  }
  .top-row { display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px; }

  .primary-btn {
    width: 100%; margin-top: 12px; padding: 11px; border: none; border-radius: 8px;
    background: var(--ink); color: var(--paper); font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .primary-btn:active { background: #293659; }
  .ghost-btn {
    padding: 9px; border: 1px solid var(--border); border-radius: 8px; background: transparent;
    color: var(--ink-soft); font-size: 13px; cursor: pointer;
  }

  .warn { margin-top: 10px; display:flex; align-items:center; gap:6px; font-size: 12px; color: var(--red); }

  .time-field { border: 1px solid var(--border); border-radius: 8px; background: #fff; padding: 10px; }
  .time-display { font-size: 22px; display: block; text-align: center; margin-bottom: 8px; letter-spacing: 0.02em; }
  .tbtn-wide {
    width: 100%; border: 1px solid var(--border); background: var(--paper); color: var(--ink-soft);
    border-radius: 7px; padding: 8px; font-size: 12px; cursor: pointer; font-weight: 600;
  }
  .tbtn-wide:active { background: var(--row-hover); }

  .dayoff-toggle {
    width: 100%; height: 100%; min-height: 76px; border: 1px solid var(--border); border-radius: 8px;
    background: #fff; color: var(--ink-soft); font-size: 13px; cursor: pointer; font-weight: 600;
  }
  .dayoff-toggle.active { background: var(--row-selected); border-color: var(--gold); color: var(--gold); }

  .headline-card { text-align: center; }
  .headline-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-soft); }
  .headline-value { font-family: ui-monospace, monospace; font-size: 32px; margin-top: 4px; }
  .headline-sub { font-size: 12px; color: var(--ink-faint); margin-top: 4px; }
  .breakdown-toggle {
    margin-top: 12px; background: none; border: none; color: var(--gold); font-size: 12.5px;
    cursor: pointer; font-weight: 600;
  }
  .breakdown-detail { margin-top: 12px; display: none; }
  .breakdown-detail.show { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat {
    background: var(--paper); border: 1px solid var(--border); border-radius: 10px; padding: 10px;
    display: flex; flex-direction: column; min-width: 0;
  }
  .stat .s-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft); }
  .stat .s-value { font-family: ui-monospace, monospace; font-size: 17px; margin-top: 4px; white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
  .stat .s-sub { font-size: 10px; color: var(--ink-faint); margin-top: 3px; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .month-nav .m-label { font-size: 15px; font-weight: 600; }

  .wd-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; flex-wrap: wrap; }
  .wd-row input { width: 56px; text-align: center; padding: 4px; }
  .wd-hint { color: #B0A990; }

  table.ledger { width: 100%; border-collapse: collapse; }
  .ledger thead th {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint);
    text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border);
  }
  .ledger thead th:last-child { text-align: right; }
  .ledger tbody tr { border-bottom: 1px solid #EDE8DA; cursor: pointer; }
  .ledger tbody tr:active { background: var(--row-hover); }
  .ledger tbody tr.selected { background: var(--row-selected); }
  .ledger tbody tr.empty { opacity: 0.4; }
  .ledger td { padding: 7px 10px; font-size: 12.5px; }
  .ledger td:last-child { text-align: right; }
  .ledger-wrap { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--card); margin-top: 14px; }
  .ledger-scroll { max-height: 320px; overflow-y: auto; }
  .ot-cell { color: var(--gold); }
  .late-dot { color: var(--red); font-size: 10px; margin-left: 3px; }

  .backup-row { display: flex; gap: 8px; margin-top: 18px; }
  .backup-row .ghost-btn { flex: 1; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: none; align-items: flex-end;
    justify-content: center; z-index: 20;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border);
    border-radius: 18px 18px 0 0; padding: 18px; max-height: 85vh; overflow-y: auto;
  }
  .modal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .modal-top h2 { font-size: 14px; font-weight: 600; margin: 0; display:flex; align-items:center; gap:6px; }
  .close-x { border: none; background: none; font-size: 18px; color: var(--ink-faint); cursor: pointer; }
  .field { margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .btn-cancel { border: 1px solid var(--border); background: transparent; color: var(--ink-soft); }
  .btn-save { border: none; background: var(--ink); color: var(--paper); font-weight: 600; }

  .picker-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none;
    align-items: flex-end; justify-content: center; z-index: 40;
  }
  .picker-backdrop.show { display: flex; }
  .picker-sheet {
    width: 100%; max-width: 480px; background: var(--card); border-radius: 18px 18px 0 0;
    padding: 18px; border: 1px solid var(--border);
  }
  .picker-title { font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 14px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.08em; }
  .choice-btn {
    width: 100%; padding: 13px; border: 1px solid var(--border); border-radius: 10px; background: var(--paper);
    font-size: 14px; text-align: left; cursor: pointer; margin-bottom: 8px; color: var(--ink);
  }
  .choice-btn:active { background: var(--row-hover); }
  .wheel-wrap { position: relative; display: flex; justify-content: center; gap: 4px; height: 160px; }
  .wheel-highlight {
    position: absolute; top: 60px; left: 8%; right: 8%; height: 40px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    background: var(--row-selected); border-radius: 8px; pointer-events: none; opacity: 0.6;
  }
  .wheel {
    width: 70px; height: 160px; overflow-y: scroll; scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .wheel::-webkit-scrollbar { display: none; }
  .wheel-item {
    height: 40px; display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, monospace; font-size: 20px; color: var(--ink-faint);
    scroll-snap-align: center;
  }
  .wheel-sep { display:flex; align-items:center; font-size: 20px; color: var(--ink-soft); height:160px; }
  .type-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
  .type-row input {
    width: 70px; text-align: center; font-size: 22px; padding: 10px; border: 1px solid var(--border);
    border-radius: 8px; font-family: ui-monospace, monospace;
  }
  .picker-actions { display: flex; gap: 8px; margin-top: 16px; }
  .picker-actions button { flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; cursor: pointer; }

  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--paper); padding: 9px 16px; border-radius: 999px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 30;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <div>
        <div class="eyebrow">Daily Ledger</div>
        <h1>Work Hours &amp; Pay</h1>
        <div class="credit">Designed &amp; built by Amaan</div>
      </div>
      <button class="icon-btn" id="settingsBtn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tabTodayBtn">Today</button>
    <button class="tab-btn" id="tabMonthBtn">Month</button>
  </div>

  <!-- ===== TODAY PANEL ===== -->
  <section id="todayPanel">
    <div class="card">
      <div class="top-row">
        <label class="label" style="margin:0;">Entry for</label>
        <div style="display:flex; align-items:center; gap:6px;">
          <button class="icon-btn" id="prevDay" aria-label="Previous day" style="padding:5px 8px;">‹</button>
          <button type="button" id="dateDisplayBtn" class="mono" style="border:1px solid var(--border); border-radius:8px; padding:8px 12px; background:#fff; font-size:14px; color:var(--ink); cursor:pointer;"></button>
          <button class="icon-btn" id="nextDay" aria-label="Next day" style="padding:5px 8px;">›</button>
        </div>
      </div>

      <div class="row-2" style="margin-bottom:12px;">
        <div>
          <label class="field-label">Shift</label>
          <select id="shiftSelect" class="mono">
            <option value="morning">Morning (7AM–4PM)</option>
            <option value="evening">Evening (3PM–11PM)</option>
            <option value="fullday">Full day (7AM–11PM)</option>
          </select>
        </div>
        <div>
          <label class="field-label">Day off</label>
          <button type="button" id="dayOffBtn" class="dayoff-toggle">🏖 Mark off</button>
        </div>
      </div>

      <div class="row-2">
        <div>
          <label class="field-label">Clock in</label>
          <div class="time-field">
            <span class="time-display mono" id="clockInDisplay">--:--</span>
            <button type="button" class="tbtn-wide" data-target="clockIn">Set time</button>
          </div>
        </div>
        <div>
          <label class="field-label">Clock out</label>
          <div class="time-field">
            <span class="time-display mono" id="clockOutDisplay">--:--</span>
            <button type="button" class="tbtn-wide" data-target="clockOut">Set time</button>
          </div>
        </div>
      </div>

      <div style="display:flex; gap:8px;">
        <button class="primary-btn" id="saveDayBtn" style="flex:2; margin-top:12px;">Save day</button>
        <button class="ghost-btn" id="deleteDayBtn" style="flex:1; margin-top:12px; color:var(--red); border-color:var(--red);">🗑 Delete</button>
      </div>
      <div class="warn" id="lateWarn" style="display:none;"></div>
    </div>

    <div class="card headline-card" style="margin-top:14px;">
      <div class="headline-label" id="headlineLabel">Day pay</div>
      <div class="headline-value" id="headlineValue">Rs 0.00</div>
      <div class="headline-sub" id="headlineSub"></div>
      <button class="breakdown-toggle" id="breakdownToggle">▾ See breakdown</button>
      <div class="breakdown-detail" id="breakdownDetail"></div>
    </div>
  </section>

  <!-- ===== MONTH PANEL ===== -->
  <section id="monthPanel" style="display:none;">
    <div class="month-nav">
      <button class="icon-btn" id="prevMonth">‹</button>
      <div class="m-label" id="monthLabel"></div>
      <button class="icon-btn" id="nextMonth">›</button>
    </div>

    <div class="stats-grid" id="monthStats"></div>

    <div class="wd-row" style="margin-top:14px;">
      <span>Working days:</span>
      <input type="number" id="workingDaysInput" class="mono" min="0" />
      <span class="wd-hint">(auto: days in month − 4)</span>
    </div>
    <div class="wd-row" id="rateLine" style="margin-top:-4px;"></div>

    <div class="ledger-wrap">
      <table class="ledger">
        <thead>
          <tr><th style="width:2rem;">Day</th><th>Worked</th><th>OT</th><th>Pay</th></tr>
        </thead>
      </table>
      <div class="ledger-scroll">
        <table class="ledger"><tbody id="monthBody"></tbody></table>
      </div>
    </div>

    <div class="backup-row">
      <button class="ghost-btn" id="exportBtn">⬇ Export backup</button>
      <button class="ghost-btn" id="importBtn">⬆ Import backup</button>
      <input type="file" id="importFile" accept="application/json" style="display:none;" />
    </div>
  </section>
</div>

<!-- ===== SETTINGS MODAL ===== -->
<div class="modal-backdrop" id="settingsModal">
  <div class="modal">
    <div class="modal-top">
      <h2>⏱ Pay settings</h2>
      <button class="close-x" id="closeSettings">✕</button>
    </div>
    <div class="field">
      <label class="field-label">Standard hours before OT</label>
      <input type="number" id="setStandardHours" class="mono" step="0.5" />
    </div>
    <div class="field">
      <label class="field-label">Monthly salary (Rs)</label>
      <input type="number" id="setMonthlySalary" class="mono" />
    </div>
    <div class="field">
      <label class="field-label">OT multiplier</label>
      <input type="number" id="setOtMultiplier" class="mono" step="0.1" />
    </div>
    <div class="field" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
      <label class="field-label" style="margin:0;">Enable late deduction system</label>
      <input type="checkbox" id="setDeductionEnabled" style="width:20px; height:20px;" />
    </div>
    <div class="field">
      <label class="field-label">Late tier 1 amount (Rs)</label>
      <input type="number" id="setLateTier1" class="mono" />
    </div>
    <div class="field">
      <label class="field-label">Late tier 2 amount (Rs)</label>
      <input type="number" id="setLateTier2" class="mono" />
    </div>
    <div class="field">
      <label class="field-label">Day off allowance (per month)</label>
      <input type="number" id="setDayOffAllowance" class="mono" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelSettings">Cancel</button>
      <button class="btn-save" id="saveSettingsBtn">Save</button>
    </div>
  </div>
</div>

<!-- ===== DELETE CONFIRM MODAL ===== -->
<div class="modal-backdrop" id="confirmDeleteModal">
  <div class="modal">
    <div class="modal-top">
      <h2>🗑 Delete entry</h2>
      <button class="close-x" id="closeConfirmDelete">✕</button>
    </div>
    <p id="confirmDeleteText" style="font-size:14px; color:var(--ink-soft); margin:0 0 4px;"></p>
    <div class="modal-actions">
      <button class="btn-cancel" id="confirmDeleteCancel">Cancel</button>
      <button class="btn-save" id="confirmDeleteYes" style="background:var(--red);">Delete</button>
    </div>
  </div>
</div>

<!-- ===== TIME CHOOSER (Set time -> Now / Scroll / Type) ===== -->
<div class="picker-backdrop" id="chooserBackdrop">
  <div class="picker-sheet">
    <div class="picker-title">Set time</div>
    <button class="choice-btn" id="chooseNow">🕐 Use current time</button>
    <button class="choice-btn" id="chooseScroll">🎚 Scroll to pick</button>
    <button class="choice-btn" id="chooseType">⌨ Type manually</button>
    <div class="picker-actions">
      <button class="btn-cancel" id="chooserCancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ===== SCROLL WHEEL PICKER ===== -->
<div class="picker-backdrop" id="scrollPickerBackdrop">
  <div class="picker-sheet">
    <div class="picker-title">Scroll to set time</div>
    <div class="wheel-wrap">
      <div class="wheel-highlight"></div>
      <div class="wheel" id="hourWheel"></div>
      <div class="wheel-sep">:</div>
      <div class="wheel" id="minuteWheel"></div>
    </div>
    <div class="picker-actions">
      <button class="btn-cancel" id="scrollPickerCancel">Cancel</button>
      <button class="btn-save" id="scrollPickerSet">Set</button>
    </div>
  </div>
</div>

<!-- ===== DATE WHEEL PICKER ===== -->
<div class="picker-backdrop" id="datePickerBackdrop">
  <div class="picker-sheet">
    <div class="picker-title">Scroll to set date</div>
    <div class="wheel-wrap">
      <div class="wheel-highlight"></div>
      <div class="wheel" id="dayWheel" style="width:56px;"></div>
      <div class="wheel" id="monthWheel" style="width:70px;"></div>
      <div class="wheel" id="yearWheel" style="width:70px;"></div>
    </div>
    <div class="picker-actions">
      <button class="btn-cancel" id="datePickerCancel">Cancel</button>
      <button class="btn-save" id="datePickerSet">Set</button>
    </div>
  </div>
</div>

<!-- ===== TYPE PICKER ===== -->
<div class="picker-backdrop" id="typePickerBackdrop">
  <div class="picker-sheet">
    <div class="picker-title">Type time</div>
    <div class="type-row">
      <input type="number" id="typeHour" class="mono" min="0" max="23" placeholder="HH" />
      <span style="font-size:20px;">:</span>
      <input type="number" id="typeMinute" class="mono" min="0" max="59" placeholder="MM" />
    </div>
    <div class="picker-actions">
      <button class="btn-cancel" id="typePickerCancel">Cancel</button>
      <button class="btn-save" id="typePickerSet">Set</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  "use strict";

  // ---------- storage keys ----------
  const K_SETTINGS = "wl_settings";
  const K_ENTRIES = "wl_entries";
  const K_OVERRIDES = "wl_workingdays";

  const DEFAULT_SETTINGS = {
    standardHours: 9,
    monthlySalary: 30000,
    otMultiplier: 1.5,
    deductionEnabled: true,
    lateTier1Amount: 200,
    lateTier2Amount: 400,
    dayOffAllowance: 4,
  };

  const SHIFTS = {
    morning: { label: "Morning (7AM–4PM)", tier1: "07:15", tier2: "08:00" },
    evening: { label: "Evening (3PM–11PM)", tier1: "15:15", tier2: "16:00" },
    fullday: { label: "Full day (7AM–11PM)", tier1: "07:15", tier2: "08:00" },
  };
  const RELAXED_TIER = { tier1: "08:30", tier2: "09:00" };

  function loadJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) {
      return fallback;
    }
  }
  function saveJSON(key, val) {
    localStorage.setItem(key, JSON.stringify(val));
  }

  let settings = { ...DEFAULT_SETTINGS, ...loadJSON(K_SETTINGS, {}) };
  let entries = loadJSON(K_ENTRIES, {});
  let overrides = loadJSON(K_OVERRIDES, {});

  // ---------- helpers ----------
  const pad = (n) => String(n).padStart(2, "0");
  const todayISO = () => {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  };
  const monthKeyOf = (iso) => iso.slice(0, 7);
  const daysInMonth = (ym) => {
    const [y, m] = ym.split("-").map(Number);
    return new Date(y, m, 0).getDate();
  };
  const defaultWorkingDays = (ym) => Math.max(0, daysInMonth(ym) - 4);
  const timeToMinutes = (t) => {
    if (!t) return null;
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
  };
  const minutesToHM = (mins) => {
    if (mins == null || isNaN(mins)) return "0h 00m";
    const sign = mins < 0 ? "-" : "";
    mins = Math.abs(Math.round(mins));
    return `${sign}${Math.floor(mins / 60)}h ${pad(mins % 60)}m`;
  };
  const rupees = (n) => {
    n = n || 0;
    const sign = n < 0 ? "-" : "";
    return "Rs " + sign + Math.abs(n).toLocaleString("en-LK", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  };

  function getHourlyRate(workingDays) {
    if (!workingDays) return 0;
    const dailyPay = settings.monthlySalary / workingDays;
    return dailyPay / settings.standardHours;
  }

  function computeDay(entry, hourlyRate, liveNow, prevDayEndedMidnight) {
    const empty = { hasEntry: false, late: false, workedMinutes: 0, otMinutes: 0, normalPay: 0, otPay: 0, lateDeduction: 0, totalPay: 0, isLive: false, isDayOff: false };
    if (!entry) return empty;
    if (entry.dayOff) {
      return { hasEntry: true, late: false, workedMinutes: 0, otMinutes: 0, normalPay: 0, otPay: 0, lateDeduction: 0, totalPay: 0, isLive: false, isDayOff: true };
    }
    if (!entry.clockIn) return empty;
    let outMin;
    let isLive = false;
    if (entry.clockOut) {
      outMin = timeToMinutes(entry.clockOut);
    } else if (liveNow) {
      outMin = liveNow.getHours() * 60 + liveNow.getMinutes();
      isLive = true;
    } else {
      return empty;
    }
    const inMin = timeToMinutes(entry.clockIn);
    if (outMin < inMin) outMin += 24 * 60;

    const shift = SHIFTS[entry.shift] || SHIFTS.morning;
    const tiers = prevDayEndedMidnight ? RELAXED_TIER : shift;
    const tier1Min = timeToMinutes(tiers.tier1);
    const tier2Min = timeToMinutes(tiers.tier2);
    let late = false;
    let lateDeduction = 0;
    if (settings.deductionEnabled) {
      if (inMin > tier2Min) { late = true; lateDeduction = settings.lateTier2Amount; }
      else if (inMin > tier1Min) { late = true; lateDeduction = settings.lateTier1Amount; }
    }

    const standardMinutes = settings.standardHours * 60;
    const workedMinutes = Math.max(0, outMin - inMin);
    const normalMinutes = Math.min(workedMinutes, standardMinutes);
    const otMinutes = Math.max(0, workedMinutes - standardMinutes);
    const normalPay = (normalMinutes / 60) * hourlyRate;
    const otPay = (otMinutes / 60) * hourlyRate * settings.otMultiplier;
    const totalPay = normalPay + otPay - lateDeduction;
    return { hasEntry: true, late, workedMinutes, otMinutes, normalPay, otPay, lateDeduction, totalPay, isLive, isDayOff: false };
  }

  // ---------- state ----------
  let selectedDate = todayISO();
  let ym = monthKeyOf(selectedDate);
  let breakdownOpen = false;

  // ---------- DOM refs ----------
  const $ = (id) => document.getElementById(id);
  const dateDisplayBtn = $("dateDisplayBtn");
  const clockInDisplay = $("clockInDisplay");
  const clockOutDisplay = $("clockOutDisplay");
  const dayOffBtn = $("dayOffBtn");
  const shiftSelect = $("shiftSelect");
  let clockInValue = "";
  let clockOutValue = "";
  let shiftValue = "morning";
  let dayOffValue = false;
  const lateWarn = $("lateWarn");
  const monthLabel = $("monthLabel");
  const monthStats = $("monthStats");
  const monthBody = $("monthBody");
  const workingDaysInput = $("workingDaysInput");
  const toast = $("toast");

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1400);
  }

  function statCard(label, value, sub, color) {
    return `<div class="stat"><span class="s-label">${label}</span><span class="s-value" style="color:${color || "var(--ink)"}">${value}</span>${sub ? `<span class="s-sub">${sub}</span>` : ""}</div>`;
  }

  // ---------- tabs ----------
  const todayPanel = $("todayPanel");
  const monthPanel = $("monthPanel");
  const tabTodayBtn = $("tabTodayBtn");
  const tabMonthBtn = $("tabMonthBtn");
  function showTab(tab) {
    const isToday = tab === "today";
    todayPanel.style.display = isToday ? "block" : "none";
    monthPanel.style.display = isToday ? "none" : "block";
    tabTodayBtn.classList.toggle("active", isToday);
    tabMonthBtn.classList.toggle("active", !isToday);
  }
  tabTodayBtn.addEventListener("click", () => showTab("today"));
  tabMonthBtn.addEventListener("click", () => showTab("month"));

  // ---------- previous-day-midnight helper ----------
  function prevDayEndedMidnight(iso) {
    const d = new Date(iso);
    d.setDate(d.getDate() - 1);
    const prevIso = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    // entries holds full history in one object, so this works across month/year boundaries too
    const prevOut = entries[prevIso]?.clockOut;
    if (!prevOut) return false;
    return timeToMinutes(prevOut) >= timeToMinutes("23:00");
  }

  // ---------- today panel rendering ----------
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function formatDateDisplay(iso) {
    const [y, m, d] = iso.split("-").map(Number);
    return `${pad(d)} ${MONTHS[m - 1]} ${y}`;
  }

  function renderDayForm() {
    dateDisplayBtn.textContent = formatDateDisplay(selectedDate);
    const e = entries[selectedDate];
    clockInValue = e?.clockIn || "";
    clockOutValue = e?.clockOut || "";
    shiftValue = e?.shift || "morning";
    dayOffValue = !!e?.dayOff;
    shiftSelect.value = shiftValue;
    clockInDisplay.textContent = clockInValue || "--:--";
    clockOutDisplay.textContent = clockOutValue || "--:--";
    updateDayOffUI();
    updateDayStats();
  }

  function updateDayOffUI() {
    dayOffBtn.textContent = dayOffValue ? "✅ Off" : "🏖 Mark off";
    dayOffBtn.classList.toggle("active", dayOffValue);
    document.querySelectorAll(".tbtn-wide").forEach((b) => (b.disabled = dayOffValue));
    shiftSelect.disabled = dayOffValue;
  }

  dayOffBtn.addEventListener("click", () => {
    dayOffValue = !dayOffValue;
    updateDayOffUI();
    updateDayStats();
  });

  shiftSelect.addEventListener("change", () => {
    shiftValue = shiftSelect.value;
    updateDayStats();
  });

  $("breakdownToggle").addEventListener("click", () => {
    breakdownOpen = !breakdownOpen;
    updateDayStats();
  });

  function updateDayStats() {
    const draftEntry = dayOffValue
      ? { dayOff: true }
      : { clockIn: clockInValue, clockOut: clockOutValue, shift: shiftValue };
    const workingDays = overrides[ym] != null ? overrides[ym] : defaultWorkingDays(ym);
    const hourlyRate = getHourlyRate(workingDays);
    const isToday = selectedDate === todayISO();
    const liveNow = isToday && clockInValue && !clockOutValue && !dayOffValue ? new Date() : null;
    const relaxed = prevDayEndedMidnight(selectedDate);
    const calc = computeDay(draftEntry, hourlyRate, liveNow, relaxed);

    lateWarn.style.display = calc.late ? "flex" : "none";
    lateWarn.textContent = calc.late
      ? `⚠ Late arrival${relaxed ? " (relaxed rule applied)" : ""} — Rs ${calc.lateDeduction} deduction applied`
      : "";

    const breakdownEl = $("breakdownDetail");
    const toggleEl = $("breakdownToggle");

    if (calc.isDayOff) {
      $("headlineLabel").textContent = "Status";
      $("headlineValue").textContent = "🏖 Day off";
      $("headlineValue").style.color = "var(--gold)";
      $("headlineSub").textContent = "No pay counted for this date";
      toggleEl.style.display = "none";
      breakdownEl.classList.remove("show");
      return;
    }
    toggleEl.style.display = "inline-block";

    const isLive = calc.isLive;
    $("headlineLabel").innerHTML = isLive
      ? `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;"></span>Live earning`
      : "Day pay";
    $("headlineValue").textContent = rupees(calc.totalPay);
    $("headlineValue").style.color = isLive ? "var(--green)" : "var(--ink)";
    $("headlineSub").textContent = isLive ? "updating as you work" : "";

    toggleEl.textContent = breakdownOpen ? "▴ Hide breakdown" : "▾ See breakdown";
    breakdownEl.classList.toggle("show", breakdownOpen);
    if (breakdownOpen) {
      const cards = [
        statCard("Worked" + (isLive ? " (so far)" : ""), minutesToHM(calc.workedMinutes)),
        statCard("OT hours", minutesToHM(calc.otMinutes), null, "var(--gold)"),
        statCard("Normal pay", rupees(calc.normalPay)),
        statCard("OT pay", rupees(calc.otPay), null, "var(--gold)"),
      ];
      if (settings.deductionEnabled) {
        cards.push(statCard("Deduction", rupees(-calc.lateDeduction), null, calc.lateDeduction ? "var(--red)" : "var(--ink)"));
      }
      breakdownEl.innerHTML = cards.join("");
    }
  }

  setInterval(updateDayStats, 20000);

  // ---------- month panel rendering ----------
  function renderMonth() {
    const [y, m] = ym.split("-").map(Number);
    monthLabel.textContent = new Date(y, m - 1, 1).toLocaleDateString("en-GB", { month: "long", year: "numeric" });

    const workingDays = overrides[ym] != null ? overrides[ym] : defaultWorkingDays(ym);
    const hourlyRate = getHourlyRate(workingDays);
    const dailyRate = hourlyRate * settings.standardHours;
    const otRate = hourlyRate * settings.otMultiplier;
    workingDaysInput.value = workingDays;

    const total = daysInMonth(ym);
    const rows = [];
    let sums = { worked: 0, ot: 0, normalPay: 0, otPay: 0, deductions: 0, total: 0, daysWorked: 0, lateDays: 0, daysOff: 0 };

    for (let d = 1; d <= total; d++) {
      const iso = `${ym}-${pad(d)}`;
      const calc = computeDay(entries[iso], hourlyRate, null, prevDayEndedMidnight(iso));
      rows.push({ iso, day: d, ...calc });
      sums.worked += calc.workedMinutes;
      sums.ot += calc.otMinutes;
      sums.normalPay += calc.normalPay;
      sums.otPay += calc.otPay;
      sums.deductions += calc.lateDeduction;
      sums.total += calc.totalPay;
      sums.daysWorked += calc.hasEntry && !calc.isDayOff ? 1 : 0;
      sums.lateDays += calc.late ? 1 : 0;
      sums.daysOff += calc.isDayOff ? 1 : 0;
    }

    const monthCards = [
      statCard("Normal pay total", rupees(sums.normalPay)),
      statCard("OT pay total", rupees(sums.otPay), null, "var(--gold)"),
      statCard("Total OT hours", minutesToHM(sums.ot), null, "var(--gold)"),
      statCard("Total earned", rupees(sums.total), sums.deductions ? `after − ${rupees(sums.deductions)} deductions` : null, "var(--green)"),
      statCard("Days worked", `${sums.daysWorked} / ${workingDays}`, "working days"),
      statCard("Days off", `${sums.daysOff} / ${settings.dayOffAllowance}`, sums.daysOff > settings.dayOffAllowance ? "over allowance" : "allowance used", sums.daysOff > settings.dayOffAllowance ? "var(--red)" : "var(--gold)"),
    ];
    if (settings.deductionEnabled) {
      monthCards.push(statCard("Late days", String(sums.lateDays), sums.deductions ? `− ${rupees(sums.deductions)} total` : "no deductions", sums.lateDays ? "var(--red)" : "var(--ink)"));
    }
    monthStats.innerHTML = monthCards.join("");

    $("rateLine").textContent = `Daily: ${rupees(dailyRate)}  ·  Hourly: ${rupees(hourlyRate)}  ·  OT/hr: ${rupees(otRate)}`;

    monthBody.innerHTML = rows.map((r) => {
      const cls = ["", r.iso === selectedDate ? "selected" : "", r.hasEntry ? "" : "empty"].join(" ").trim();
      if (r.isDayOff) {
        return `<tr class="${cls}" data-date="${r.iso}">
          <td>${r.day}</td>
          <td colspan="3" style="color:var(--gold);">🏖 Day off</td>
        </tr>`;
      }
      return `<tr class="${cls}" data-date="${r.iso}">
        <td>${r.day}${r.late ? '<span class="late-dot">⚠</span>' : ""}</td>
        <td>${r.hasEntry ? minutesToHM(r.workedMinutes) : "—"}</td>
        <td class="${r.otMinutes ? "ot-cell" : ""}">${r.otMinutes ? minutesToHM(r.otMinutes) : "—"}</td>
        <td>${r.hasEntry ? rupees(r.totalPay) : "—"}</td>
      </tr>`;
    }).join("");

    monthBody.querySelectorAll("tr").forEach((tr) => {
      tr.addEventListener("click", () => {
        selectedDate = tr.getAttribute("data-date");
        renderDayForm();
        renderMonth();
        showTab("today");
      });
    });
  }

  function renderAll() {
    renderDayForm();
    renderMonth();
  }

  // ---------- date / day / month navigation ----------
  dateDisplayBtn.addEventListener("click", () => openDatePicker());

  function goToMonth(newYm) {
    const total = daysInMonth(newYm);
    const day = Math.min(Number(selectedDate.slice(8, 10)), total);
    ym = newYm;
    selectedDate = `${newYm}-${pad(day)}`;
    renderDayForm();
    renderMonth();
  }
  $("prevMonth").addEventListener("click", () => {
    const [y, m] = ym.split("-").map(Number);
    const d = new Date(y, m - 2, 1);
    goToMonth(`${d.getFullYear()}-${pad(d.getMonth() + 1)}`);
  });
  $("nextMonth").addEventListener("click", () => {
    const [y, m] = ym.split("-").map(Number);
    const d = new Date(y, m, 1);
    goToMonth(`${d.getFullYear()}-${pad(d.getMonth() + 1)}`);
  });

  function shiftSelectedDate(deltaDays) {
    const [y, m, d] = selectedDate.split("-").map(Number);
    const nd = new Date(y, m - 1, d + deltaDays);
    selectedDate = `${nd.getFullYear()}-${pad(nd.getMonth() + 1)}-${pad(nd.getDate())}`;
    const newYm = monthKeyOf(selectedDate);
    if (newYm !== ym) {
      ym = newYm;
      renderMonth();
    }
    renderDayForm();
  }
  $("prevDay").addEventListener("click", () => shiftSelectedDate(-1));
  $("nextDay").addEventListener("click", () => shiftSelectedDate(1));

  $("saveDayBtn").addEventListener("click", () => {
    if (dayOffValue) {
      entries[selectedDate] = { dayOff: true, shift: shiftValue };
    } else if (!clockInValue && !clockOutValue) {
      delete entries[selectedDate];
    } else {
      entries[selectedDate] = { clockIn: clockInValue, clockOut: clockOutValue, shift: shiftValue };
    }
    saveJSON(K_ENTRIES, entries);
    showToast("Saved");
    renderAll();
  });

  $("deleteDayBtn").addEventListener("click", () => {
    $("confirmDeleteText").textContent = `Delete the entry for ${formatDateDisplay(selectedDate)}? This can't be undone.`;
    $("confirmDeleteModal").classList.add("show");
  });
  function closeConfirmDelete() { $("confirmDeleteModal").classList.remove("show"); }
  $("closeConfirmDelete").addEventListener("click", closeConfirmDelete);
  $("confirmDeleteCancel").addEventListener("click", closeConfirmDelete);
  $("confirmDeleteYes").addEventListener("click", () => {
    delete entries[selectedDate];
    saveJSON(K_ENTRIES, entries);
    dayOffValue = false;
    closeConfirmDelete();
    showToast("Entry deleted");
    renderAll();
  });

  workingDaysInput.addEventListener("change", () => {
    overrides[ym] = Number(workingDaysInput.value) || 0;
    saveJSON(K_OVERRIDES, overrides);
    renderMonth();
  });

  // ---------- settings modal ----------
  const settingsModal = $("settingsModal");
  function openSettings() {
    $("setStandardHours").value = settings.standardHours;
    $("setMonthlySalary").value = settings.monthlySalary;
    $("setOtMultiplier").value = settings.otMultiplier;
    $("setDeductionEnabled").checked = settings.deductionEnabled;
    $("setLateTier1").value = settings.lateTier1Amount;
    $("setLateTier2").value = settings.lateTier2Amount;
    $("setDayOffAllowance").value = settings.dayOffAllowance;
    settingsModal.classList.add("show");
  }
  function closeSettings() { settingsModal.classList.remove("show"); }
  $("settingsBtn").addEventListener("click", openSettings);
  $("closeSettings").addEventListener("click", closeSettings);
  $("cancelSettings").addEventListener("click", closeSettings);
  $("saveSettingsBtn").addEventListener("click", () => {
    settings = {
      standardHours: Number($("setStandardHours").value) || DEFAULT_SETTINGS.standardHours,
      monthlySalary: Number($("setMonthlySalary").value) || DEFAULT_SETTINGS.monthlySalary,
      otMultiplier: Number($("setOtMultiplier").value) || DEFAULT_SETTINGS.otMultiplier,
      deductionEnabled: $("setDeductionEnabled").checked,
      lateTier1Amount: Number($("setLateTier1").value) || DEFAULT_SETTINGS.lateTier1Amount,
      lateTier2Amount: Number($("setLateTier2").value) || DEFAULT_SETTINGS.lateTier2Amount,
      dayOffAllowance: Number($("setDayOffAllowance").value) || DEFAULT_SETTINGS.dayOffAllowance,
    };
    saveJSON(K_SETTINGS, settings);
    closeSettings();
    showToast("Settings saved");
    renderAll();
  });

  // ---------- backup / restore ----------
  $("exportBtn").addEventListener("click", () => {
    const backup = { settings, entries, overrides, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `work-ledger-backup-${todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Backup downloaded");
  });

  $("importBtn").addEventListener("click", () => $("importFile").click());
  $("importFile").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.settings) settings = { ...DEFAULT_SETTINGS, ...data.settings };
        if (data.entries) entries = data.entries;
        if (data.overrides) overrides = data.overrides;
        saveJSON(K_SETTINGS, settings);
        saveJSON(K_ENTRIES, entries);
        saveJSON(K_OVERRIDES, overrides);
        showToast("Backup restored");
        renderAll();
      } catch (err) {
        showToast("Invalid backup file");
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  });

  // ---------- time chooser (Set time -> Now / Scroll / Type) ----------
  const pad2 = (n) => String(n).padStart(2, "0");
  let chooserTarget = null;

  function setTimeValue(target, hhmm) {
    if (target === "clockIn") { clockInValue = hhmm; clockInDisplay.textContent = hhmm; }
    else { clockOutValue = hhmm; clockOutDisplay.textContent = hhmm; }
    updateDayStats();
  }
  function getTimeValue(target) {
    return target === "clockIn" ? clockInValue : clockOutValue;
  }

  document.querySelectorAll(".tbtn-wide").forEach((btn) => {
    btn.addEventListener("click", () => {
      chooserTarget = btn.getAttribute("data-target");
      $("chooserBackdrop").classList.add("show");
    });
  });
  $("chooserCancel").addEventListener("click", () => $("chooserBackdrop").classList.remove("show"));
  $("chooseNow").addEventListener("click", () => {
    const d = new Date();
    setTimeValue(chooserTarget, `${pad2(d.getHours())}:${pad2(d.getMinutes())}`);
    $("chooserBackdrop").classList.remove("show");
    showToast("Time set to now");
  });
  $("chooseScroll").addEventListener("click", () => {
    $("chooserBackdrop").classList.remove("show");
    openScrollPicker(chooserTarget);
  });
  $("chooseType").addEventListener("click", () => {
    $("chooserBackdrop").classList.remove("show");
    openTypePicker(chooserTarget);
  });

  // -- scroll wheel picker --
  const ITEM_H = 40;
  const hourWheel = $("hourWheel");
  const minuteWheel = $("minuteWheel");
  let scrollTarget = null;

  function buildWheel(el, max, current) {
    const spacer = (ITEM_H * 2) + "px";
    let html = `<div style="height:${spacer}"></div>`;
    for (let i = 0; i < max; i++) {
      html += `<div class="wheel-item" data-val="${i}">${pad2(i)}</div>`;
    }
    html += `<div style="height:${spacer}"></div>`;
    el.innerHTML = html;
    el.scrollTop = current * ITEM_H;
  }

  function openScrollPicker(target) {
    scrollTarget = target;
    const current = getTimeValue(target) || "07:00";
    const [h, m] = current.split(":").map(Number);
    buildWheel(hourWheel, 24, h || 0);
    buildWheel(minuteWheel, 60, m || 0);
    $("scrollPickerBackdrop").classList.add("show");
  }
  function closeScrollPicker() { $("scrollPickerBackdrop").classList.remove("show"); }
  $("scrollPickerCancel").addEventListener("click", closeScrollPicker);
  $("scrollPickerSet").addEventListener("click", () => {
    const h = Math.max(0, Math.min(23, Math.round(hourWheel.scrollTop / ITEM_H)));
    const m = Math.max(0, Math.min(59, Math.round(minuteWheel.scrollTop / ITEM_H)));
    setTimeValue(scrollTarget, `${pad2(h)}:${pad2(m)}`);
    closeScrollPicker();
    showToast("Time set");
  });

  // -- date wheel picker (Day / Month / Year) --
  const dayWheel = $("dayWheel");
  const monthWheel = $("monthWheel");
  const yearWheel = $("yearWheel");

  function buildLabelWheel(el, labels, currentIndex) {
    const spacer = (ITEM_H * 2) + "px";
    let html = `<div style="height:${spacer}"></div>`;
    labels.forEach((label) => {
      html += `<div class="wheel-item">${label}</div>`;
    });
    html += `<div style="height:${spacer}"></div>`;
    el.innerHTML = html;
    el.scrollTop = currentIndex * ITEM_H;
  }

  function openDatePicker() {
    const [y, m, d] = selectedDate.split("-").map(Number);
    const dayLabels = Array.from({ length: 31 }, (_, i) => pad2(i + 1));
    const yearStart = y - 5;
    const yearLabels = Array.from({ length: 11 }, (_, i) => String(yearStart + i));
    buildLabelWheel(dayWheel, dayLabels, d - 1);
    buildLabelWheel(monthWheel, MONTHS, m - 1);
    buildLabelWheel(yearWheel, yearLabels, y - yearStart);
    $("datePickerBackdrop").classList.add("show");
  }
  function closeDatePicker() { $("datePickerBackdrop").classList.remove("show"); }
  $("datePickerCancel").addEventListener("click", closeDatePicker);
  $("datePickerSet").addEventListener("click", () => {
    let day = Math.max(1, Math.min(31, Math.round(dayWheel.scrollTop / ITEM_H) + 1));
    const monthIndex = Math.max(0, Math.min(11, Math.round(monthWheel.scrollTop / ITEM_H)));
    const [selY] = selectedDate.split("-").map(Number);
    const yearStart = selY - 5;
    const year = yearStart + Math.max(0, Math.min(10, Math.round(yearWheel.scrollTop / ITEM_H)));
    const ymCandidate = `${year}-${pad(monthIndex + 1)}`;
    const maxDay = daysInMonth(ymCandidate);
    day = Math.min(day, maxDay);
    selectedDate = `${year}-${pad(monthIndex + 1)}-${pad(day)}`;
    ym = monthKeyOf(selectedDate);
    closeDatePicker();
    renderAll();
    showToast("Date set");
  });

  // -- type picker --
  let typeTarget = null;
  function openTypePicker(target) {
    typeTarget = target;
    const current = getTimeValue(target) || "";
    const [h, m] = current.split(":");
    $("typeHour").value = h || "";
    $("typeMinute").value = m || "";
    $("typePickerBackdrop").classList.add("show");
  }
  function closeTypePicker() { $("typePickerBackdrop").classList.remove("show"); }
  $("typePickerCancel").addEventListener("click", closeTypePicker);
  $("typePickerSet").addEventListener("click", () => {
    let h = Math.max(0, Math.min(23, Number($("typeHour").value) || 0));
    let m = Math.max(0, Math.min(59, Number($("typeMinute").value) || 0));
    setTimeValue(typeTarget, `${pad2(h)}:${pad2(m)}`);
    closeTypePicker();
    showToast("Time set");
  });

  // ---------- init ----------
  renderAll();
})();
</script>
</body>
</html>
