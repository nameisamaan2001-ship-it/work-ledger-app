apply plugin: 'com.android.application'
android {
    namespace 'com.workledger.app'
    compileSdk 34
    defaultConfig {
        applicationId "com.workledger.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file("../debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
    }
}
